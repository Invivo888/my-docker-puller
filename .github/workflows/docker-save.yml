name: Docker Image Downloader (Split Version)

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: '输入完整的 Docker 镜像名称'
        required: true
        default: 'vllm/vllm-openai:latest'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Pull Docker Image
        run: |
          docker pull ${{ github.event.inputs.image_name }}

      - name: Save, Compress and Split
        run: |
          CLEAN_NAME=$(echo "${{ github.event.inputs.image_name }}" | sed 's/[:\/]/_/g')
          # 1. 保存并压缩
          docker save ${{ github.event.inputs.image_name }} | gzip > full_image.tar.gz
          
          # 2. 切分成每份 2000MB 的小块 (避免触发 2GB 限制)
          # 文件名会变成：vllm_vllm-openai_latest.tar.gz.part-aa, ...ab, ...ac
          split -b 2000M full_image.tar.gz "${CLEAN_NAME}.tar.gz.part-"
          
          # 3. 删除超大原文件，腾出空间给上传步骤
          rm full_image.tar.gz
          
          echo "TAG_NAME=v$(date +'%Y%m%d%H%M%S')" >> $GITHUB_ENV

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Docker Image Release ${{ env.TAG_NAME }}
          files: "*.part-*"  # 上传所有切片文件
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
